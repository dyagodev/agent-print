name: Build instalador Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Build instalador .exe
        run: npm run dist

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: kero-pedir-print-windows
          path: dist/*.exe
          retention-days: 30
